<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Scripts & Tools | Joshua Olatunji</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Markdown for Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        .changelog-container {
            margin-top: 100px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            min-height: 80vh;
        }

        .changelog-sidebar {
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .changelog-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .changelog-item {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .changelog-item:hover, .changelog-item.active {
            background: rgba(167, 139, 250, 0.1);
            border-color: rgba(167, 139, 250, 0.3);
        }

        .changelog-date {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .changelog-title {
            font-weight: 600;
            color: var(--text-primary);
        }

        .changelog-content {
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }
        
        .copy-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.5);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .copy-btn:hover {
            background: rgba(167, 139, 250, 0.4);
        }

        /* Markdown Styling */
        .markdown-body {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .markdown-body h1, .markdown-body h2 {
            color: var(--text-primary);
            margin-top: 1em;
            margin-bottom: 0.5em;
        }
        .markdown-body p { margin-bottom: 1.5rem; }
        .markdown-body pre {
            background: rgba(0,0,0,0.5);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem;
        }
        .markdown-body code {
            font-family: monospace;
            background: transparent;
        }

        @media (max-width: 768px) {
            .changelog-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="blob-bg"></div>
    
    <nav class="glass-nav">
        <div class="nav-content container">
            <div class="logo">JO<span>.</span></div>
            <ul class="nav-links">
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#ventures">Ventures & Projects</a></li>
                <li><a href="index.html#experience">Experience</a></li>
                <li><a href="index.html#skills">Skills</a></li>
                <li><a href="scripts.html">Scripts</a></li>
                <li><a href="changelogs.html">Changelogs</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="changelog-container">
            <div class="changelog-sidebar">
                <h2 style="margin-bottom: 1.5rem; color: var(--primary);">Internal Tools</h2>
                <ul class="changelog-list" id="script-list">
                    <li>Loading scripts...</li>
                </ul>
            </div>
            <div class="changelog-content">
                <button id="copyBtn" class="copy-btn" style="display: none;">Copy to Clipboard</button>
                <div id="script-viewer" class="markdown-body">
                    <h2>Select a script from the sidebar to view its code.</h2>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const listEl = document.getElementById('script-list');
            const viewerEl = document.getElementById('script-viewer');
            const copyBtn = document.getElementById('copyBtn');
            let currentRawCode = "";

            try {
                const res = await fetch('scripts/index.json');
                if (!res.ok) throw new Error("Could not fetch scripts list");
                const scripts = await res.json();
                
                if (scripts.length === 0) {
                    listEl.innerHTML = "<li>No scripts found.</li>";
                    return;
                }

                listEl.innerHTML = '';
                scripts.forEach((scriptData, index) => {
                    const li = document.createElement('li');
                    li.className = 'changelog-item';
                    li.innerHTML = `
                        <div class="changelog-date">${scriptData.language}</div>
                        <div class="changelog-title">${scriptData.title}</div>
                    `;
                    li.onclick = () => loadScript(scriptData, li);
                    listEl.appendChild(li);

                    // Load the first one by default
                    if (index === 0) loadScript(scriptData, li);
                });

            } catch (err) {
                console.error(err);
                listEl.innerHTML = "<li>Failed to load scripts.</li>";
            }

            async function loadScript(scriptData, element) {
                // Update active state
                document.querySelectorAll('.changelog-item').forEach(el => el.classList.remove('active'));
                element.classList.add('active');

                viewerEl.innerHTML = "<p>Loading script...</p>";
                copyBtn.style.display = "none";
                
                try {
                    const res = await fetch(scriptData.file);
                    if (!res.ok) throw new Error("Failed to fetch script file");
                    const text = await res.text();
                    currentRawCode = text;
                    
                    // Render description and code block using Markdown
                    const mdContent = `
## ${scriptData.title}
${scriptData.description}

\`\`\`${scriptData.language}
${text}
\`\`\`
                    `;
                    
                    viewerEl.innerHTML = marked.parse(mdContent);
                    copyBtn.style.display = "block";

                } catch (err) {
                    console.error(err);
                    viewerEl.innerHTML = "<p>Error loading script.</p>";
                }
            }

            copyBtn.addEventListener('click', () => {
                if (currentRawCode) {
                    navigator.clipboard.writeText(currentRawCode).then(() => {
                        const originalText = copyBtn.innerText;
                        copyBtn.innerText = "Copied!";
                        setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
                    });
                }
            });
        });
    </script>
</body>
</html>
