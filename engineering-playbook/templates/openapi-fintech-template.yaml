openapi: 3.0.3
info:
  title: GTP API - Sandbox
  version: 1.0.0
  x-logo:
    url: https://s3-eu-west-1.amazonaws.com/tpd/logos/5f977ff6e7ffb200012faf5c/0x0.png
    altText: Expedier Logo
    href: https://expedier.co
  description: |-
    Guaranty Trust Payments - Expedier APIs (Sandbox Environment)

    Looking to test the APIs interactively? Use our **[Swagger UI Console](/gtp/v1/schema/swagger-ui/)** to execute requests directly against the sandbox backend.
  contact:
    name: Expedier API Support
    email: support@expedier.co
    url: https://expedier.co/support
  license:
    name: Proprietary
    url: https://expedier.co/terms
paths:
  /account:
    get:
      operationId: get_account_details
      description: Retrieve EFB account details for the authenticated client including
        DDT virtual accounts and linked bank accounts
      summary: Get Account Details
      tags:
      - Account
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailsResponse'
              examples:
                AccountDetailsResponse:
                  value:
                    success: true
                    message: Account details retrieved successfully
                    data:
                      account:
                        user_id: 12345
                        email: business@example.com
                        company_name: Example Corp
                        business_type: corporation
                        contact_email: contact@example.com
                        contact_phone: '+14165551234'
                        kyb_status: approved
                        account_status: active
                        created_at: '2024-01-15T10:30:00Z'
                        updated_at: '2024-05-20T14:22:00Z'
                      ddt_accounts:
                      - account_number: '1234567'
                        transit_number: '00001'
                        institution_number: '001'
                        institution_name: DCP
                        currency: CAD
                        status: active
                      bank_accounts:
                      - id: 789
                        account_name: Example Corp Operating
                        account_number: '****5678'
                        bank_name: TD Bank
                        currency: CAD
                        verified: true
                        account_type: checking
                  summary: Account Details Response
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /account/update:
    patch:
      operationId: update_account_details
      description: Update contact information, webhook URL, and custom metadata for
        the authenticated client. Only specified fields will be updated.
      summary: Update Account Details
      tags:
      - Account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateAccountRequestRequest'
            examples:
              UpdateAccountRequest:
                value:
                  contact_email: newcontact@example.com
                  contact_phone: '+14165559999'
                  webhook_url: https://example.com/webhooks/gtp
                  metadata:
                    department: finance
                    cost_center: CC-001
                summary: Update Account Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateAccountRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateAccountRequestRequest'
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAccountResponse'
              examples:
                UpdateAccountResponse:
                  value:
                    success: true
                    message: Account updated successfully
                    data:
                      updated_fields:
                      - contact_email
                      - webhook_url
                      account:
                        contact_email: newcontact@example.com
                        contact_phone: '+14165551234'
                        webhook_url: https://example.com/webhooks/gtp
                        metadata:
                          department: finance
                          cost_center: CC-001
                  summary: Update Account Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /accounts:
    get:
      operationId: list_bank_accounts
      description: List all bank accounts including DDT virtual accounts (CAD) and
        regular bank accounts linked to the authenticated client
      summary: List Bank Accounts
      tags:
      - Banks
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBankAccountsResponse'
              examples:
                ListBankAccountsResponse:
                  value:
                    success: true
                    message: Bank accounts retrieved successfully
                    data:
                      ddt_accounts:
                      - account_number: '1234567'
                        transit_number: '00001'
                        institution_number: '001'
                        institution_name: DCP
                        currency: CAD
                        status: active
                      bank_accounts:
                      - id: 789
                        account_name: Example Corp Operating
                        account_number: '****5678'
                        bank_name: TD Bank
                        currency: CAD
                        verified: true
                      total_accounts: 2
                  summary: List Bank Accounts Response
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /banks:
    get:
      operationId: list_banks
      description: Get list of available banks for a specific currency. Returns bank
        codes and names for use in transfers.
      summary: List Banks
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: Currency code (NGN, CAD, USD, GBP, EUR)
        required: true
      tags:
      - Banks
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountDetailsResponse'
              examples:
                BankAccountDetailsResponse:
                  value:
                    success: true
                    message: Bank account retrieved successfully
                    data:
                      bank_account:
                        id: 1234
                        account_name: Example Corp Operating Account
                        account_number: '****7890'
                        transit_number: '00001'
                        institution_number: '001'
                        bank_name: TD Bank
                        currency: CAD
                        account_type: checking
                        verified: true
                        status: active
                        created_at: '2024-05-20T10:30:00Z'
                        verified_at: '2024-05-21T09:15:00Z'
                  summary: Bank Account Details Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /banks/validate:
    post:
      operationId: validate_bank_account
      description: Validate a bank account number before initiating a transfer. Returns
        account holder name if valid. bank_code is required ONLY for NGN and must
        be omitted for other currencies.
      summary: Validate Bank Account
      tags:
      - Banks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateBankAccountRequestRequest'
            examples:
              ValidateNGNBankAccountRequest:
                value:
                  currency: NGN
                  bank_code: 058
                  account_number: 0123456789
                summary: Validate NGN Bank Account Request
              ValidateCADBankAccountRequest:
                value:
                  currency: CAD
                  account_number: recipient@example.com
                summary: Validate CAD Bank Account Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ValidateBankAccountRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ValidateBankAccountRequestRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountDetailsResponse'
              examples:
                BankAccountDetailsResponse:
                  value:
                    success: true
                    message: Bank account retrieved successfully
                    data:
                      bank_account:
                        id: 1234
                        account_name: Example Corp Operating Account
                        account_number: '****7890'
                        transit_number: '00001'
                        institution_number: '001'
                        bank_name: TD Bank
                        currency: CAD
                        account_type: checking
                        verified: true
                        status: active
                        created_at: '2024-05-20T10:30:00Z'
                        verified_at: '2024-05-21T09:15:00Z'
                  summary: Bank Account Details Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /currencies:
    get:
      operationId: list_currencies
      description: List all available currencies supported by the platform including
        currency codes, names, and symbols.
      summary: List Currencies
      tags:
      - Exchange Rates
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExchangeRatesResponse'
              examples:
                ExchangeRatesResponse:
                  value:
                    success: true
                    message: Exchange rates retrieved successfully
                    data:
                      base_currency: CAD
                      rates:
                        USD: '0.7350'
                        EUR: '0.6820'
                        GBP: '0.5890'
                        NGN: '610.50'
                      timestamp: '2024-05-20T10:30:00Z'
                      source: live_market
                      expires_at: '2024-05-20T10:35:00Z'
                  summary: Exchange Rates Response
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /rates:
    get:
      operationId: get_exchange_rates
      description: Get all available exchange rates with optional filtering by source
        and destination currency.
      summary: Get Exchange Rates
      parameters:
      - in: query
        name: from_currency
        schema:
          type: string
        description: Filter by source currency (e.g., CAD)
      - in: query
        name: to_currency
        schema:
          type: string
        description: Filter by destination currency (e.g., USD)
      tags:
      - Exchange Rates
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExchangeRatesResponse'
              examples:
                ExchangeRatesResponse:
                  value:
                    success: true
                    message: Exchange rates retrieved successfully
                    data:
                      base_currency: CAD
                      rates:
                        USD: '0.7350'
                        EUR: '0.6820'
                        GBP: '0.5890'
                        NGN: '610.50'
                      timestamp: '2024-05-20T10:30:00Z'
                      source: live_market
                      expires_at: '2024-05-20T10:35:00Z'
                  summary: Exchange Rates Response
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /rates/{from_currency}/{to_currency}:
    get:
      operationId: get_exchange_rate
      description: Get exchange rate for a specific currency pair with current buy
        rate and timestamp.
      summary: Get Exchange Rate
      parameters:
      - in: path
        name: from_currency
        schema:
          type: string
        required: true
      - in: path
        name: to_currency
        schema:
          type: string
        required: true
      tags:
      - Exchange Rates
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecificRateResponse'
              examples:
                SpecificRateResponse:
                  value:
                    success: true
                    message: Exchange rate retrieved successfully
                    data:
                      from_currency: CAD
                      to_currency: USD
                      rate: '0.7350'
                      inverse_rate: '1.3605'
                      timestamp: '2024-05-20T10:30:00Z'
                      source: live_market
                      expires_at: '2024-05-20T10:35:00Z'
                      example_conversion:
                        amount: '100.00'
                        from_currency: CAD
                        converted_amount: '73.50'
                        to_currency: USD
                  summary: Specific Rate Response
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /rates/convert:
    get:
      operationId: calculate_conversion
      description: Calculate currency conversion amount based on current exchange
        rates. Returns converted amount using live rates.
      summary: Calculate Conversion
      parameters:
      - in: query
        name: amount
        schema:
          type: number
          format: float
        description: Amount to convert
        required: true
      - in: query
        name: from_currency
        schema:
          type: string
        description: Source currency code (e.g., USD)
        required: true
      - in: query
        name: to_currency
        schema:
          type: string
        description: Destination currency code (e.g., CAD)
        required: true
      tags:
      - Exchange Rates
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecificRateResponse'
              examples:
                SpecificRateResponse:
                  value:
                    success: true
                    message: Exchange rate retrieved successfully
                    data:
                      from_currency: CAD
                      to_currency: USD
                      rate: '0.7350'
                      inverse_rate: '1.3605'
                      timestamp: '2024-05-20T10:30:00Z'
                      source: live_market
                      expires_at: '2024-05-20T10:35:00Z'
                      example_conversion:
                        amount: '100.00'
                        from_currency: CAD
                        converted_amount: '73.50'
                        to_currency: USD
                  summary: Specific Rate Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /sandbox/wallets/fund:
    post:
      operationId: fund_wallet_sandbox
      description: Mock deposit/e-transfer funding for sandbox wallets. Supports CAD,
        NGN, USD, EUR, and GBP. Restricted to sandbox clients.
      summary: Sandbox Wallet Funding
      tags:
      - Wallets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SandboxFundingRequestRequest'
            examples:
              SandboxCADFundingRequest:
                value:
                  currency: CAD
                  amount: '1000.00'
                  sender_email: client@acme.co
                  sender_name: Acme Corp
                  sender_fi: TD Canada Trust
                  memo: Test funding
                  client_reference: ref_cad_123
                summary: Sandbox CAD Funding Request
              SandboxNGNFundingRequest:
                value:
                  currency: NGN
                  amount: '50000.00'
                  source_account_number: '1234567890'
                  source_account_name: Acme Corp
                  source_bank_name: Access Bank
                  narration: Test NGN deposit
                  client_reference: ref_ngn_123
                summary: Sandbox NGN Funding Request
              SandboxUSDFundingRequest:
                value:
                  currency: USD
                  amount: '1000.00'
                  source_account_number: '123456789'
                  source_account_name: Acme Corp
                  source_bank_name: JPMorgan Chase
                  routing_number: '021000021'
                  client_reference: ref_usd_123
                summary: Sandbox USD Funding Request
              SandboxEURFundingRequest:
                value:
                  currency: EUR
                  amount: '500.00'
                  source_iban: DE89370400440532013000
                  source_bic: DBKEDEMMXXX
                  source_account_name: Acme Corp
                  source_bank_name: Deutsche Bank
                  client_reference: ref_eur_123
                summary: Sandbox EUR Funding Request
              SandboxGBPFundingRequest:
                value:
                  currency: GBP
                  amount: '250.00'
                  source_account_number: '98765432'
                  source_sort_code: '102030'
                  source_account_name: Acme Corp
                  source_bank_name: Barclays
                  client_reference: ref_gbp_123
                summary: Sandbox GBP Funding Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SandboxFundingRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SandboxFundingRequestRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxFundingResponse'
              examples:
                SandboxFundingSuccessResponse:
                  value:
                    success: true
                    message: Sandbox wallet funding initiated successfully
                    data:
                      transaction_id: 9821
                      reference: sandbox_fund_9fa38de091bf2a56
                      currency: CAD
                      amount: '1000.00'
                      status: successful
                      processed: false
                  summary: Sandbox Funding Success Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /swap:
    post:
      operationId: execute_swap
      description: Execute a currency swap/exchange between wallets. Converts from
        one currency to another using current exchange rates.
      summary: Execute Swap
      tags:
      - Swaps
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteSwapRequestRequest'
            examples:
              ExecuteSwapRequest:
                value:
                  from_wallet_id: wlt_cad_001
                  to_wallet_id: wlt_usd_002
                  amount: '1000.00'
                  from_currency: CAD
                  to_currency: USD
                  lock_rate: true
                  reference: SWAP-2024-001
                  metadata:
                    purpose: inventory_purchase
                    vendor_id: VND-789
                summary: Execute Swap Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ExecuteSwapRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ExecuteSwapRequestRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteSwapResponse'
              examples:
                ExecuteSwapResponse:
                  value:
                    success: true
                    message: Currency swap executed successfully
                    data:
                      swap:
                        id: swp_abc123def456
                        status: completed
                        from_wallet_id: wlt_cad_001
                        to_wallet_id: wlt_usd_002
                        from_amount: '1000.00'
                        from_currency: CAD
                        to_amount: '735.00'
                        to_currency: USD
                        exchange_rate: '0.7350'
                        fee: '7.35'
                        net_amount: '727.65'
                        rate_locked: true
                        reference: SWAP-2024-001
                        created_at: '2024-05-20T10:30:00Z'
                        completed_at: '2024-05-20T10:30:05Z'
                  summary: Execute Swap Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /swap/{swap_id}:
    get:
      operationId: get_swap_status
      description: Get detailed status of a specific swap by swap ID including conversion
        rate, amounts, and timestamps.
      summary: Get Swap Status
      parameters:
      - in: path
        name: swap_id
        schema:
          type: string
        required: true
      tags:
      - Swaps
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapDetailsResponse'
              examples:
                SwapDetailsResponse:
                  value:
                    success: true
                    message: Swap details retrieved successfully
                    data:
                      swap:
                        id: swp_abc123def456
                        status: completed
                        from_wallet_id: wlt_cad_001
                        to_wallet_id: wlt_usd_002
                        from_amount: '1000.00'
                        from_currency: CAD
                        to_amount: '735.00'
                        to_currency: USD
                        exchange_rate: '0.7350'
                        fee: '7.35'
                        fee_percentage: '1.00'
                        net_amount: '727.65'
                        rate_locked: true
                        rate_expires_at: '2024-05-20T10:35:00Z'
                        reference: SWAP-2024-001
                        metadata:
                          purpose: inventory_purchase
                          vendor_id: VND-789
                        created_at: '2024-05-20T10:30:00Z'
                        completed_at: '2024-05-20T10:30:05Z'
                  summary: Swap Details Response
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /swap/list:
    get:
      operationId: list_swaps
      description: List swap/exchange history with pagination and optional currency
        filtering.
      summary: List Swaps
      parameters:
      - in: query
        name: currency
        schema:
          type: string
        description: Filter by currency (source or destination)
      - in: query
        name: page
        schema:
          type: integer
        description: Page number (1-indexed)
      - in: query
        name: page_size
        schema:
          type: integer
        description: Items per page (max 100)
      tags:
      - Swaps
      security:
      - cookieAuth: []
      - basicAuth: []
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapDetailsResponse'
              examples:
                SwapDetailsResponse:
                  value:
                    success: true
                    message: Swap details retrieved successfully
                    data:
                      swap:
                        id: swp_abc123def456
                        status: completed
