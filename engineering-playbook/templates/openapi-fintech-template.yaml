components:
  schemas:
    AccountDetailsResponse:
      type: object
      description: Response for GET /account endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    AccountTypeEnum:
      enum:
      - checking
      - savings
      type: string
      description: |-
        * `checking` - checking
        * `savings` - savings
    BankAccountDetailsResponse:
      type: object
      description: Response for GET /banks/{id} endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    ErrorResponse:
      type: object
      description: Standard error response wrapper used by all endpoints.
      properties:
        success:
          type: boolean
          default: false
          description: Always false for error responses
        message:
          type: string
          description: Human-readable error message
        errors:
          description: Error details including code and additional context
      required:
      - errors
      - message
    ExchangeRatesResponse:
      type: object
      description: Response for GET /rates endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    ExecuteSwapRequestRequest:
      type: object
      description: Request body for POST /swaps endpoint.
      properties:
        from_wallet_id:
          type: string
          minLength: 1
          description: Source wallet ID
        to_wallet_id:
          type: string
          minLength: 1
          description: Destination wallet ID
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,17}(?:\.\d{0,2})?$
          description: Amount to swap (in from_currency)
        from_currency:
          type: string
          minLength: 1
          description: Source currency code (ISO 4217)
          maxLength: 3
        to_currency:
          type: string
          minLength: 1
          description: Destination currency code (ISO 4217)
          maxLength: 3
        lock_rate:
          type: boolean
          default: false
          description: Lock the current exchange rate for this swap
        reference:
          type: string
          minLength: 1
          description: External reference number
          maxLength: 100
        metadata:
          description: Custom metadata
      required:
      - amount
      - from_currency
      - from_wallet_id
      - to_currency
      - to_wallet_id
    ExecuteSwapResponse:
      type: object
      description: Response for POST /swaps endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    GTPWebhook:
      type: object
      description: Basic webhook serializer
      properties:
        id:
          type: integer
          readOnly: true
        url:
          type: string
          format: uri
          description: Webhook endpoint URL
          maxLength: 500
        description:
          type: string
          description: Description of this webhook
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusEnum'
        total_deliveries:
          type: integer
          readOnly: true
          description: Total delivery attempts
        successful_deliveries:
          type: integer
          readOnly: true
          description: Successful deliveries
        failed_deliveries:
          type: integer
          readOnly: true
          description: Failed deliveries
        success_rate:
          type: number
          format: double
          readOnly: true
        last_delivery_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Last delivery attempt
        last_success_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Last successful delivery
        created_on:
          type: string
          format: date-time
          readOnly: true
        updated_on:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_on
      - failed_deliveries
      - id
      - last_delivery_at
      - last_success_at
      - success_rate
      - successful_deliveries
      - total_deliveries
      - updated_on
      - url
    GTPWebhookCreateRequest:
      type: object
      description: Serializer for creating a webhook
      properties:
        url:
          type: string
          format: uri
          minLength: 1
          description: Webhook endpoint URL
          maxLength: 500
        description:
          type: string
          description: Description of this webhook (optional)
          maxLength: 255
      required:
      - url
    InitiateTransferRequestRequest:
      type: object
      description: Request body for POST /transfers endpoint.
      properties:
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,17}(?:\.\d{0,2})?$
          description: Transfer amount
        currency:
          type: string
          minLength: 1
          description: Currency code (ISO 4217, e.g. NGN, CAD, USD, GBP, EUR)
          maxLength: 3
        client_reference:
          type: string
          minLength: 1
          description: Unique reference for idempotency
          maxLength: 100
        reference:
          type: string
          minLength: 1
          description: Transfer description / narration
          maxLength: 255
        description:
          type: string
          minLength: 1
          description: Alternative field for transfer description
          maxLength: 255
        bank_id:
          type: integer
          description: Internal Bank ID (required for NGN)
        account_number:
          type: string
          minLength: 1
          description: Recipient bank account number (required for NGN, USD, GBP,
            EUR)
        account_name:
          type: string
          minLength: 1
          description: Recipient bank account name (required for NGN, USD, GBP, EUR)
        recipient_email:
          type: string
          format: email
          minLength: 1
          description: Recipient email address (required for CAD e-Transfers)
        bank_name:
          type: string
          minLength: 1
          description: Recipient bank name (required for USD)
        routing_number:
          type: string
          minLength: 1
          description: 9-digit routing number (required for USD)
        email:
          type: string
          format: email
          minLength: 1
          description: Recipient email address (required for USD)
        account_type:
          allOf:
          - $ref: '#/components/schemas/AccountTypeEnum'
          description: |-
            Account type (required for USD)

            * `checking` - checking
            * `savings` - savings
        address:
          type: string
          minLength: 1
          description: Recipient street address (optional for USD)
        state_id:
          type: integer
          description: State database ID (optional for USD)
        city:
          type: string
          minLength: 1
          description: Recipient city (optional for USD)
        postal_code:
          type: string
          minLength: 1
          description: Recipient postal code (optional for USD)
        recipient_uid:
          type: string
          minLength: 1
          description: Recipient user UID (for internal transfers only)
      required:
      - amount
      - client_reference
      - currency
    InitiateTransferResponse:
      type: object
      description: Response for POST /transfers endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    ListBankAccountsResponse:
      type: object
      description: Response for GET /accounts endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    ListTransactionsResponse:
      type: object
      description: Response for GET /transactions endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
        pagination: {}
      required:
      - data
      - message
      - pagination
    ListTransfersResponse:
      type: object
      description: Response for GET /transfers endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
        pagination: {}
      required:
      - data
      - message
      - pagination
    ListWalletsResponse:
      type: object
      description: Response for GET /wallets endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    PatchedUpdateAccountRequestRequest:
      type: object
      description: Request body for PATCH /account endpoint.
      properties:
        contact_email:
          type: string
          format: email
          minLength: 1
          description: Primary contact email for notifications
        contact_phone:
          type: string
          minLength: 1
          description: Contact phone number (E.164 format recommended)
          maxLength: 20
        webhook_url:
          type: string
          format: uri
          minLength: 1
          description: HTTPS URL for webhook notifications
        metadata:
          description: Custom metadata (key-value pairs)
    SandboxFundingRequestRequest:
      type: object
      description: Request payload for sandbox wallet funding.
      properties:
        currency:
          type: string
          minLength: 1
          description: ISO 4217 currency code (e.g. CAD, NGN, USD, EUR, GBP)
          maxLength: 3
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,17}(?:\.\d{0,2})?$
          description: Amount to fund
        sender_email:
          type: string
          format: email
          minLength: 1
          description: Sender email (CAD only)
        sender_name:
          type: string
          minLength: 1
          description: Sender name (CAD only)
        sender_fi:
          type: string
          minLength: 1
          description: Sender financial institution (CAD only)
        narration:
          type: string
          minLength: 1
          description: Narration for transfer (NGN only)
        source_account_number:
          type: string
          minLength: 1
          description: Source account number or IBAN
        source_account_name:
          type: string
          minLength: 1
          description: Source account name
        source_bank_name:
          type: string
          minLength: 1
          description: Source bank name
        routing_number:
          type: string
          minLength: 1
          description: Routing number (USD only)
        source_iban:
          type: string
          minLength: 1
          description: Source IBAN (EUR only)
        source_bic:
          type: string
          minLength: 1
          description: Source BIC (EUR only)
        source_sort_code:
          type: string
          minLength: 1
          description: Source sort code (GBP only)
        memo:
          type: string
          minLength: 1
          description: Optional memo
        client_reference:
          type: string
          minLength: 1
          description: Optional client reference/idempotency key
      required:
      - amount
      - currency
    SandboxFundingResponse:
      type: object
      description: Response for sandbox wallet funding request.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    SpecificRateResponse:
      type: object
      description: Response for GET /rates/{from}/{to} endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    StatusEnum:
      enum:
      - active
      - paused
      - disabled
      type: string
      description: |-
        * `active` - Active
        * `paused` - Paused
        * `disabled` - Disabled
    SwapDetailsResponse:
      type: object
      description: Response for GET /swaps/{id} endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    TransferDetailsResponse:
      type: object
      description: Response for GET /transfers/{id} endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    UpdateAccountResponse:
      type: object
      description: Response for PATCH /account endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
    ValidateBankAccountRequestRequest:
      type: object
      description: Request body for POST /banks/validate endpoint.
      properties:
        currency:
          type: string
          minLength: 1
          description: Currency code (NGN, CAD, USD, GBP, EUR)
          maxLength: 3
        bank_code:
          type: string
          minLength: 1
          description: Internal bank ID (required only for NGN, omitted for other
            currencies)
          maxLength: 50
        account_number:
          type: string
          minLength: 1
          description: Account number or email address (for CAD eTransfer)
          maxLength: 100
      required:
      - account_number
      - currency
    WalletBalanceResponse:
      type: object
      description: Response for GET /wallets/{id}/balance endpoint.
      properties:
        success:
          type: boolean
          default: true
        message:
          type: string
        data: {}
      required:
      - data
      - message
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 'API key for authentication. Format: `gtp_<environment>_<key>`'
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: /gtp/v1
  description: Current Environment (Relative Path)
- url: https://gtp-sandbox.expediergo.com/gtp/v1
  description: Sandbox Environment (for testing)
- url: https://gtp.expediergo.com/gtp/v1
  description: Production Environment
tags:
- name: Account
  description: Account management and details
- name: Banks
  description: Bank account operations
- name: Wallets
  description: Multi-currency wallet management
- name: Transactions
  description: Transaction history and details
- name: Transfers
  description: Initiate and manage transfers
- name: Exchange Rates
  description: Currency exchange rates
- name: Swaps
  description: Currency swap operations
- name: Webhooks
  description: Webhook configuration and management
- name: Admin
  description: Administrative operations (requires admin API key)
